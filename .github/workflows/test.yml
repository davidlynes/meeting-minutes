name: Tests

on:
  push:
    branches: [main, "enhance/*", "fix/*", "feature/*"]
    paths:
      - "frontend/src/**"
      - "frontend/package.json"
      - "frontend/vitest.config.ts"
      - "backend/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/src/**"
      - "frontend/package.json"
      - "frontend/vitest.config.ts"
      - "backend/**"
      - ".github/workflows/test.yml"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Run tests
        working-directory: frontend
        run: pnpm test

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Dump test output to summary
        if: failure()
        working-directory: backend
        run: |
          echo '### Backend Test Output (last 200 lines)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-output
          path: backend/test-output.txt
