name: Tests

on:
  push:
    branches: [main, "enhance/*", "fix/*", "feature/*"]
    paths:
      - "frontend/src/**"
      - "frontend/package.json"
      - "frontend/vitest.config.ts"
      - "backend/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/src/**"
      - "frontend/package.json"
      - "frontend/vitest.config.ts"
      - "backend/**"
      - ".github/workflows/test.yml"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Run tests
        working-directory: frontend
        run: pnpm test

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Wait for MongoDB
        run: |
          for i in $(seq 1 10); do
            if mongosh --eval "db.runCommand({ ping: 1 })" --quiet 2>/dev/null; then
              echo "MongoDB is ready"
              break
            fi
            echo "Waiting for MongoDB... ($i)"
            sleep 2
          done

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify imports
        working-directory: backend
        run: |
          python -c "import sys; sys.path.insert(0, 'app'); import main; print('main.py OK')"
          python -c "import sys; sys.path.insert(0, 'app'); import transcript_processor; print('transcript_processor OK')"

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=long 2>&1 || (echo "--- pytest collect-only ---" && pytest tests/ --collect-only 2>&1; exit 1)
